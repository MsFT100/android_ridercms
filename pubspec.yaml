name: ridercms
description: "A EV charging project"
publish_to: 'none'

version: 1.0.1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase dependencies
  firebase_auth: ^5.5.4
  firebase_core: ^3.11.0
  firebase_database: ^11.1.9
  firebase_messaging: ^15.0.3
  firebase_crashlytics: ^4.0.3
  firebase_storage: ^12.4.1
  firebase_app_check: ^0.3.1 # Updated version
  flutter_local_notifications: ^19.2.1

  get: ^4.7.3
  geolocator: ^14.0.2
  google_maps_flutter: ^2.15.0
  google_sign_in: ^7.2.0

  flutter_gcaptcha_v3: ^2.1.1
  http: ^1.0.0
  intl_phone_field: ^3.2.0
  mobile_scanner: ^7.2.0
  provider: ^6.1.1
  permission_handler: ^12.0.0+1
  shared_preferences: ^2.5.4
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/svg/
